version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskapp
      POSTGRES_PASSWORD: taskapp_dev
      POSTGRES_DB: taskapp_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskapp -d taskapp_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskapp_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://taskapp:taskapp_dev@postgres:5432/taskapp_dev
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod_min_32_chars
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod_min_32_chars
      CORS_ORIGIN: http://localhost:5173
      BCRYPT_ROUNDS: 10
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskapp_frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
